spring.application.name=clinicos-service

# Server Configuration
server.port=8080

# MySQL DataSource Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/clinicos?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=admin@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
app.jwt.secret=clinicos-secret-key-change-in-production-min-256-bits-required-for-hs256
app.jwt.access-token-expiration=86400000
app.jwt.refresh-token-expiration=2592000000

# OpenAPI / Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Storage Configuration
# Option 1: Local filesystem (default for dev)
clinicos.storage.type=local
clinicos.storage.local.base-path=/opt/clinicos/uploads
clinicos.storage.local.base-url=https://clinicos.codingrippler.com/uploads

# Option 2: S3 / DigitalOcean Spaces (for production)
# To switch: change clinicos.storage.type=s3 and fill in credentials
# clinicos.storage.type=s3
# clinicos.storage.s3.bucket=clinicos-images
# clinicos.storage.s3.region=blr1
# clinicos.storage.s3.endpoint=https://blr1.digitaloceanspaces.com
# clinicos.storage.s3.access-key=YOUR_ACCESS_KEY
# clinicos.storage.s3.secret-key=YOUR_SECRET_KEY
# clinicos.storage.s3.public-url=https://clinicos-images.blr1.digitaloceanspaces.com
