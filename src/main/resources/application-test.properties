# Test Profile Configuration
spring.application.name=clinicos-service

# MySQL Test Database
spring.datasource.url=jdbc:mysql://localhost:3306/clinicos?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=admin@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration for tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration (test values)
app.jwt.secret=test-secret-key-for-testing-purposes-only-min-256-bits
app.jwt.access-token-expiration=900000
app.jwt.refresh-token-expiration=604800000

# Disable Swagger in tests
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Actuator
management.endpoints.web.exposure.include=health
